<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="color: #0a84ff; margin-bottom: 20px; font-weight: 500; cursor: pointer;" onclick="location.href='index.html'">
        ‹ Search
    </div>

    <div class="details-header">
        <img id="appIcon" src="" class="details-icon">
        <div style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h2 id="appName">Loading...</h2>
                <p id="appMeta" class="text-muted" style="margin-top: 4px;"></p>
            </div>
            </div>
    </div>

    <hr style="border: none; border-top: 1px solid #2c2c2e; margin-bottom: 20px;">

    <h3 style="margin-bottom: 12px; font-size: 20px;">Preview</h3>
    <div class="screenshots">
        <img src="https://via.placeholder.com/200x350/1c1c1e/fff?text=SS+1">
        <img src="https://via.placeholder.com/200x350/1c1c1e/fff?text=SS+2">
    </div>

    <div class="ios-card" style="margin-top: 20px;">
        <p id="appDesc" style="color: #e5e5ea; line-height: 1.5; font-size: 15px;"></p>
    </div>

    <div style="position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px);">
        <p id="timer" style="display: none;"></p>
        <button id="downloadBtn" class="btn-primary">GET</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
