<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Apps</h1>
    
    <input type="text" id="searchInput" class="search-bar" placeholder="Games, Apps, Tools...">

    <div class="category-list">
        <button class="cat-chip active" onclick="setCategory('All', this)">All</button>
        <button class="cat-chip" onclick="setCategory('Tools', this)">Tools</button>
        <button class="cat-chip" onclick="setCategory('Games', this)">Games</button>
        <button class="cat-chip" onclick="setCategory('Entertainment', this)">Entertainment</button>
        <button class="cat-chip" onclick="setCategory('UI Mods', this)">UI Mods</button>
    </div>

    <div id="appList">
        </div>

    <script src="script.js"></script>
</body>
</html>
