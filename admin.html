<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="color: #0a84ff; margin-bottom: 20px; font-weight: 500; cursor: pointer;" onclick="location.href='index.html'">
        ‹ Storefront
    </div>

    <h2 style="margin-bottom: 20px;">Admin Dashboard</h2>
    
    <div class="ios-card">
        <form id="addAppForm">
            <input type="text" id="appName" class="ios-input" placeholder="App Name" required>
            
            <select id="appCategory" class="ios-input" required>
                <option value="Tools">Tools</option>
                <option value="Games">Games</option>
                <option value="Entertainment">Entertainment</option>
                <option value="UI Mods">UI Mods</option>
            </select>

            <input type="text" id="appVersion" class="ios-input" placeholder="Version (e.g. v1.0)" required>
            <input type="text" id="appSize" class="ios-input" placeholder="Size (e.g. 50 MB)" required>
            <input type="url" id="appIcon" class="ios-input" placeholder="Icon URL" required>
            <input type="url" id="appLink" class="ios-input" placeholder="Direct Download Link" required>
            <textarea id="appDesc" class="ios-input" placeholder="Mod Features..." rows="4" required></textarea>
            
            <button type="submit" id="submitBtn" class="btn-primary">Publish App</button>
        </form>
    </div>

    <h3 style="margin: 30px 0 15px 0;">Posted Apps</h3>
    <div id="adminAppList">
        </div>

    <script src="script.js"></script>
</body>
</html>
